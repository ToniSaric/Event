name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GTest
        run: sudo apt-get update && sudo apt-get install -y libgtest-dev

      - name: Run tests
        run: make test
